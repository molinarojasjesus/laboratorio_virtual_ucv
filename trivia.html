<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescate en el Laberinto - Profesora Jacinta</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e0f2f1;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #game-container {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        #vidas { color: #e53935; }
        #tiempo { color: #ffb300; }
        #visual-box {
            background-color: #81c784;
            height: 120px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 1.2em;
            color: white;
            font-weight: bold;
        }
        #pregunta {
            font-size: 1.2em;
            margin-bottom: 20px;
            min-height: 60px;
        }
        .btn-opcion {
            display: block;
            width: 100%;
            padding: 18px; /* Botones grandes para celular */
            margin: 10px 0;
            font-size: 1.1em;
            font-weight: bold;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 3px 0 #388e3c;
        }
        .btn-opcion:active {
            transform: translateY(3px);
            box-shadow: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <div>Vidas: <span id="vidas">❤️ ❤️ ❤️</span></div>
        <div>⏱️ <span id="tiempo">15</span>s</div>
    </div>

    <div id="visual-box">🌱 Estado: Semilla</div>

    <div id="pregunta">Cargando pregunta...</div>

    <div id="opciones-container">
        </div>
</div>

<script>
// 1. Banco de preguntas sobre el ciclo de vida de las plantas
const preguntas = [
    {
        q: "¿Cuál es la primera etapa en la vida de una planta?",
        options: ["Germinación", "Polinización", "Dispersión"],
        correct: 0,
        fasePlanta: "🌿 Brote inicial"
    },
    {
        q: "¿Qué necesita la semilla principalmente para despertar?",
        options: ["Sombra y viento", "Agua y calor", "Tierra seca"],
        correct: 1,
        fasePlanta: "🍃 Planta joven"
    },
    {
        q: "¿Qué parte de la planta absorbe el agua del suelo?",
        options: ["Las hojas", "El tallo", "La raíz"],
        correct: 2,
        fasePlanta: "🌳 Planta adulta"
    },
    {
        q: "¿Cómo se llama el proceso donde la flor se convierte en fruto?",
        options: ["Polinización", "Fotosíntesis", "Absorción"],
        correct: 0,
        fasePlanta: "🌸 ¡Flores y frutos!"
    }
];

let preguntaActual = 0;
let vidas = 3;
let tiempo = 15;
let temporizador;

const txtVidas = document.getElementById("vidas");
const txtTiempo = document.getElementById("tiempo");
const txtPregunta = document.getElementById("pregunta");
const txtVisual = document.getElementById("visual-box");
const containerOpciones = document.getElementById("opciones-container");

function iniciarTemporizador() {
    tiempo = 15;
    txtTiempo.textContent = tiempo;
    clearInterval(temporizador);
    
    temporizador = setInterval(() => {
        tiempo--;
        txtTiempo.textContent = tiempo;
        if (tiempo <= 0) {
            clearInterval(temporizador);
            recibirDanio("¡Se acabó el tiempo! Cayó una plaga 🐛");
        }
    }, 1000);
}

function cargarPregunta() {
    if (preguntaActual >= preguntas.length) {
        clearInterval(temporizador);
        txtVisual.textContent = "🏆 ¡LOGRADO!";
        txtPregunta.textContent = "¡Felicidades! Rescataste a la Profesora Jacinta del árbol gigante.";
        containerOpciones.innerHTML = "";
        return;
    }

    iniciarTemporizador();
    let p = preguntas[preguntaActual];
    txtPregunta.textContent = p.q;
    containerOpciones.innerHTML = "";

    // Generar portales/caminos dinámicamente
    p.options.forEach((opcion, index) => {
        const boton = document.createElement("button");
        boton.className = "btn-opcion";
        boton.textContent = `Portal: ${opcion}`;
        boton.onclick = () => verificarRespuesta(index);
        containerOpciones.appendChild(boton);
    });
}

function verificarRespuesta(indiceSeleccionado) {
    clearInterval(temporizador);
    let p = preguntas[preguntaActual];

    if (indiceSeleccionado === p.correct) {
        // Correcto: Avanza la planta
        txtVisual.textContent = p.fasePlanta;
        preguntaActual++;
        alert("¡Correcto! El camino es seguro.");
        cargarPregunta();
    } else {
        // Incorrecto: Tormenta/Plaga
        recibirDanio("¡Portal incorrecto! Vino una tormenta ⚡");
    }
}

function recibirDanio(mensaje) {
    vidas--;
    actualizarVidasUI();
    alert(mensaje);

    if (vidas <= 0) {
        clearInterval(temporizador);
        txtVisual.textContent = "💀 FIN DEL JUEGO";
        txtPregunta.textContent = "Te quedaste sin vidas. La Profesora Jacinta sigue atrapada.";
        containerOpciones.innerHTML = "<button class='btn-opcion' onclick='reiniciarJuego()'>Reiniciar</button>";
    } else {
        cargarPregunta(); // Reintenta o pasa a la siguiente según prefieras (aquí reintenta la misma)
    }
}

function actualizarVidasUI() {
    let corazones = "";
    for(let i=0; i<3; i++) {
        corazones += i < vidas ? "❤️ " : "🖤 ";
    }
    txtVidas.textContent = corazones;
}

function reiniciarJuego() {
    vidas = 3;
    preguntaActual = 0;
    actualizarVidasUI();
    txtVisual.textContent = "🌱 Estado: Semilla";
    cargarPregunta();
}

// Arrancar el juego por primera vez
cargarPregunta();
</script>

</body>
</html>
