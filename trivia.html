<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>El Laberinto del Saber: UCV Edición</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ucv-blue: #0056b3;
            --ucv-gold: #ffc107;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
        }

        body { font-family: 'Quicksand', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        #game-container { background-color: #ffffff; width: 100%; max-width: 950px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border: 4px solid #ffffff; }

        .header-ucv { background-color: var(--ucv-blue); color: white; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo-placeholder { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        
        #panel-visual { width: 100%; height: 350px; position: relative; background: #e0f2ff; border-bottom: 4px solid #cbd5e1; overflow: hidden; background-image: url('torre_profesora.png'); background-size: cover; background-position: right; }

        .dragon { position: absolute; width: 120px; height: 120px; background-image: url('dragon.png'); background-size: contain; background-repeat: no-repeat; top: 40%; left: -15%; z-index: 10; transition: left 0.5s linear; }
        .dragon.flee { transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1) !important; left: -100% !important; transform: scaleX(-1) scale(0.5); }

        .particle { position: absolute; width: 15px; height: 15px; background: var(--ucv-gold); border-radius: 50%; opacity: 0; pointer-events: none; }
        @keyframes blow { 0% { opacity: 1; transform: translate(0,0); } 100% { opacity: 0; transform: translate(-300px, -100px) rotate(360deg); } }

        #panel-trivia { padding: 30px; }
        .timer-bar { width: 100%; height: 15px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        #progress { height: 100%; width: 100%; background: linear-gradient(to right, var(--accent-green), var(--ucv-gold), var(--accent-red)); transition: width 0.1s linear; }

        .btn-option { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #cbd5e1; background: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-option:hover { border-color: var(--ucv-blue); transform: scale(1.02); }
    </style>
</head>
<body>

<div id="game-container">
    <header class="header-ucv">
        <div class="logo-placeholder"><i class="fa-solid fa-graduation-cap"></i> UCV - Laberinto</div>
        <div><i class="fa-solid fa-user-graduate"></i> Profesora en apuros</div>
    </header>

    <div id="panel-visual">
        <div id="dragon-sprite" class="dragon"></div>
        <div id="particles"></div>
    </div>

    <div id="panel-trivia">
        <div class="timer-bar"><div id="progress"></div></div>
        <h2 id="question">Cargando...</h2>
        <div id="options"></div>
    </div>
</div>

<script>
    const QUESTIONS = [
        { q: "¿Cuál es la primera fase del ciclo de vida de una planta?", options: ["Nacimiento desde semilla", "Floración", "Fruto"], correct: 0 },
        { q: "¿Qué necesita una planta para vivir?", options: ["Arena y oscuridad", "Agua, sol y tierra", "Plástico"], correct: 1 }
    ];

    let timeLeft = 20;
    let currentIdx = 0;
    let timerInterval;

    function startGame() {
        renderQuestion();
        startTimer();
    }

    function renderQuestion() {
        const q = QUESTIONS[currentIdx];
        document.getElementById('question').textContent = q.q;
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(i);
            opts.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        if (selected === QUESTIONS[currentIdx].correct) {
            triggerWinEffects();
            currentIdx++;
            if (currentIdx < QUESTIONS.length) {
                setTimeout(renderQuestion, 1500);
            } else {
                alert("¡Has salvado a la profesora!");
            }
        } else {
            alert("¡Oh no! El dragón se acerca.");
        }
    }

    function triggerWinEffects() {
        const dragon = document.getElementById('dragon-sprite');
        dragon.classList.add('flee');
        
        // Crear partículas (efecto viento)
        for(let i=0; i<15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.top = (40 + Math.random()*20) + '%';
            p.style.left = '20%';
            p.style.animation = `blow ${0.5 + Math.random()}s forwards`;
            document.getElementById('particles').appendChild(p);
        }

        setTimeout(() => {
            dragon.classList.remove('flee');
            dragon.style.left = "-15%";
            document.getElementById('particles').innerHTML = '';
            timeLeft = 20; // Reinicia el tiempo al ganar
        }, 1500);
    }

    function startTimer() {
        const dragon = document.getElementById('dragon-sprite');
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('progress').style.width = (timeLeft / 20 * 100) + "%";
            
            // El dragón se mueve desde -15% hacia la torre (que está a la derecha)
            const pos = -15 + ((20 - timeLeft) / 20 * 95);
            dragon.style.left = pos + "%";

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("¡El dragón ha llegado a la torre!");
            }
        }, 100);
    }

    window.onload = startGame;
</script>
</body>
</html>
