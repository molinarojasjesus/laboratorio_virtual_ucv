<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Laberinto del Saber | UCV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background-color: #f0f4f8; }
        
        #stage { 
            background-image: url('profesora.png'); 
            background-size: cover; 
            background-position: center; 
        }

        @keyframes flap {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .animate-fly {
            animation: flap 1.5s ease-in-out infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100px) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            font-size: 1.5rem;
            z-index: 40;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative overflow-hidden">

    <div id="game-container" class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden border-4 border-blue-800 relative z-10">
        
        <div class="bg-blue-800 text-white p-4 flex items-center justify-between">
            <img src="logo_ucv.png" alt="Logo UCV" class="h-12 w-auto bg-white p-1 rounded-lg" onerror="this.src='https://placehold.co/100x40?text=UCV'">
            <div class="text-right">
                <h1 class="text-xl font-bold">El Laberinto del Saber</h1>
                <p class="text-blue-200 text-sm">Escuela de Educación Primaria</p>
            </div>
        </div>

        <div class="flex justify-between items-center px-8 py-4 bg-blue-50 border-b border-blue-100">
            <div class="text-blue-900 font-bold text-lg">
                Puntaje: <span id="score" class="text-2xl text-blue-700">0</span> <span class="text-gray-400 font-normal text-sm">/ 75 pts para ganar</span>
            </div>
            <div id="hearts" class="flex gap-2 text-2xl">❤️ ❤️ ❤️</div>
        </div>

        <div id="stage" class="relative h-64 overflow-hidden border-b-4 border-blue-700 bg-blue-100">
            <div class="absolute inset-0 flex items-center justify-center text-gray-400 font-bold text-sm pointer-events-none">[Fondo: profesora.png]</div>
            <img id="dragon" src="dragon.png" alt="Dragón" class="absolute bottom-4 left-0 w-24 h-24 transition-all duration-200 ease-linear z-10 animate-fly" onerror="this.src='https://placehold.co/100x100?text=🐉'">
            
            <div id="particle-container" class="absolute inset-0 pointer-events-none"></div>
        </div>

        <div class="px-6 py-4">
            <div class="w-full h-5 bg-gray-200 rounded-full overflow-hidden border border-gray-300 p-0.5">
                <div id="timer-bar" class="h-full bg-emerald-500 w-full rounded-full transition-all duration-100 ease-linear shadow-inner"></div>
            </div>
        </div>

        <div class="p-6">
            <div id="q-image-container" class="mb-4 flex justify-center h-24"></div>
            <h3 id="question-text" class="text-xl font-bold text-gray-800 mb-6 text-center">Cargando desafío...</h3>
            <div id="btn-grid" class="grid gap-3"></div>
        </div>
    </div>

    <div id="end-overlay" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" style="display: none;">
        <div class="bg-white p-8 rounded-3xl max-w-md w-full text-center border-4 border-blue-600 shadow-2xl">
            <h2 id="end-title" class="text-3xl font-bold mb-2">¡Fin del Juego!</h2>
            <p id="end-message" class="text-gray-600 mb-6">Mensaje</p>
            <div class="bg-blue-50 rounded-2xl p-4 mb-6">
                <span class="text-gray-500 block uppercase tracking-wider text-xs font-bold">Tu Puntaje Final</span>
                <span id="end-score" class="text-4xl font-bold text-blue-800">0</span>
            </div>
            <button onclick="startGame()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-6 rounded-2xl text-xl shadow-lg transition transform active:scale-95">
                Volver a Jugar 🔄
            </button>
        </div>
    </div>

    <script>
        // --- BANCO CORREGIDO: ETAPAS Y VIDA DE LAS PLANTAS ---
        const ALL_QUESTIONS = [
            { q: "¿Cómo crece el Girasol?", img: "girasol_1.png", options: ["Semilla", "Fruto", "Raíz"], correct: 0 },
            { q: "¿Cómo crece el Maíz?", img: "maiz_1.png", options: ["Semilla", "Roca", "Metal"], correct: 0 },
            { q: "¿Qué necesita la planta para vivir?", img: "imagen_3.png", options: ["Agua, tierra y luz", "Solo oscuridad", "Gaseosa y dulces"], correct: 0 },
            { q: "¿Cuál es la primera etapa en la vida de una planta?", img: "https://placehold.co/100x100?text=🌱", options: ["La flor", "La semilla", "El fruto"], correct: 1 },
            { q: "¿Cómo se llama cuando la semilla empieza a brotar?", img: "https://placehold.co/100x100?text=🌿", options: ["Germinación", "Polinización", "Marchitación"], correct: 0 },
            { q: "¿Qué parte de la planta sostiene las hojas y transporta el agua?", img: "https://placehold.co/100x100?text=🎋", options: ["La raíz", "El tallo", "La flor"], correct: 1 },
            { q: "¿Por dónde respiran y fabrican su alimento las plantas?", img: "https://placehold.co/100x100?text=🍃", options: ["Por las raíces", "Por las hojas", "Por los frutos"], correct: 1 },
            { q: "¿Qué parte sujeta con fuerza a la planta al suelo?", img: "https://placehold.co/100x100?text=🪵", options: ["La raíz", "La flor", "El tallo"], correct: 0 },
            { q: "¿En qué parte de la planta se producen las semillas?", img: "https://placehold.co/100x100?text=🌻", options: ["En el tallo", "En la raíz", "En las flores o frutos"], correct: 2 },
            { q: "¿Qué gas producen las plantas que es vital para que respiremos?", img: "https://placehold.co/100x100?text=💨", options: ["Oxígeno", "Dióxido de carbono", "Humo"], correct: 0 },
            { q: "¿Qué proceso usan las plantas para fabricar su alimento con luz solar?", img: "https://placehold.co/100x100?text=☀️", options: ["Fotosíntesis", "Digestión", "Respiración"], correct: 0 },
            { q: "¿Qué ayuda a transportar el polen de flor en flor?", img: "https://placehold.co/100x100?text=🐝", options: ["Los insectos y el viento", "Las piedras", "Los gusanos de tierra"], correct: 0 },
            { q: "Cuando una planta es vieja y cumple su ciclo, finalmente...", img: "https://placehold.co/100x100?text=🍂", options: ["Corre", "Muere", "Se vuelve de piedra"], correct: 1 },
            { q: "¿Qué parte de la planta suele transformarse en un rico fruto?", img: "https://placehold.co/100x100?text=🍎", options: ["La raíz", "La flor", "La espina"], correct: 1 },
            { q: "¿Qué sustancia verde le da el color a las hojas?", img: "https://placehold.co/100x100?text=🟢", options: ["Clorofila", "Agua dulce", "Pintura"], correct: 0 }
        ];

        let gameQuestions = []; 
        let score = 0, lives = 3, currentIdx = 0, dragonPos = 0, timer = 100, interval;
        const TARGET_SCORE = 75;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'victory') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        function shuffleQuestions() {
            let shuffled = [...ALL_QUESTIONS];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startGame() {
            score = 0; lives = 3; currentIdx = 0; dragonPos = 0; timer = 100;
            gameQuestions = shuffleQuestions(); 
            document.getElementById('end-overlay').style.display = 'none';
            updateUI();
            loadQuestion();
            runTimer();
        }

        function runTimer() {
            clearInterval(interval);
            interval = setInterval(() => {
                timer -= 1.4; 
                dragonPos += 0.8; 
                
                const timerBar = document.getElementById('timer-bar');
                timerBar.style.width = timer + "%";
                document.getElementById('dragon').style.left = dragonPos + "%";
                
                if (timer > 50) {
                    timerBar.className = "h-full bg-emerald-500 rounded-full transition-all duration-100 ease-linear shadow-inner";
                } else if (timer <= 50 && timer > 25) {
                    timerBar.className = "h-full bg-amber-500 rounded-full transition-all duration-100 ease-linear shadow-inner";
                } else {
                    timerBar.className = "h-full bg-red-500 rounded-full transition-all duration-100 ease-linear shadow-inner animate-pulse";
                }
                
                if (dragonPos >= 85) gameOver(false);
                if (timer <= 0) { 
                    lives--; 
                    timer = 100; 
                    playSound('wrong');
                    updateUI(); 
                    if(lives <= 0) gameOver(false); 
                    else nextQuestion();
                }
            }, 100);
        }

        function loadQuestion() {
            timer = 100; 
            const q = gameQuestions[currentIdx];
            document.getElementById('question-text').textContent = q.q;
            const container = document.getElementById('q-image-container');
            container.innerHTML = q.img ? `<img src="${q.img}" class="h-24 w-auto rounded-xl shadow-lg border-2 border-blue-100" onerror="this.src='https://placehold.co/100x100?text=🌱'">` : '';
            const grid = document.getElementById('btn-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'w-full p-3 border-2 border-blue-200 rounded-xl font-semibold hover:bg-blue-600 hover:text-white transition bg-white text-gray-700 shadow-sm';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(i);
                grid.appendChild(btn);
            });
        }

        function spawnParticles(emoji, count, startFromLeft) {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.textContent = emoji;
                p.style.bottom = (Math.random() * 40 + 20) + 'px';
                
                if (startFromLeft) {
                    p.style.left = (dragonPos + Math.random() * 15) + '%';
                } else {
                    p.style.left = (Math.random() * 80 + 10) + '%';
                }
                
                p.style.animationDelay = (Math.random() * 0.3) + 's';
                container.appendChild(p);
                setTimeout(() => p.remove(), 1200);
            }
        }

        function checkAnswer(idx) {
            if (idx === gameQuestions[currentIdx].correct) {
                score += 25;
                playSound('correct');
                dragonPos = Math.max(0, dragonPos - 20);
                document.getElementById('dragon').style.left = dragonPos + "%";
                
                spawnParticles('⭐', 8, true);  
                spawnParticles('❤️', 8, false); 
            } else {
                lives--;
                playSound('wrong');
            }
            updateUI();
            
            if (score >= TARGET_SCORE) { gameOver(true); return; }
            if (lives <= 0) { gameOver(false); return; }
            
            nextQuestion();
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx >= gameQuestions.length) { 
                gameOver(score >= TARGET_SCORE); 
            } else { 
                loadQuestion(); 
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('hearts').textContent = "❤️".repeat(lives);
        }

        function gameOver(won) {
            clearInterval(interval);
            const overlay = document.getElementById('end-overlay');
            const title = document.getElementById('end-title');
            const message = document.getElementById('end-message');
            const scoreDisplay = document.getElementById('end-score');
            
            scoreDisplay.textContent = score;
            
            if (won) {
                playSound('victory');
                title.textContent = "¡Victoria! 🎉";
                title.className = "text-3xl font-bold text-emerald-600 mb-2";
                message.textContent = `¡Increíble! Alcanzaste los ${score} puntos y dominaste el ciclo de vida de las plantas.`;
            } else {
                title.textContent = "¡Oh no! 💥";
                title.className = "text-3xl font-bold text-red-600 mb-2";
                message.textContent = "El dragón avanzó demasiado o te quedaste sin vidas. ¡Repasa las etapas y vuelve a intentar!";
            }
            
            overlay.style.display = 'flex';
        }

        startGame();
    </script>
</body>
</html>
