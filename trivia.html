<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Laberinto del Saber | UCV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background-color: #f0f4f8; }
        
        #stage { 
            background-image: url('profesora.png'); 
            background-size: cover; 
            background-position: center; 
        }

        @keyframes flap {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .animate-fly {
            animation: flap 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative">

    <div id="game-container" class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden border-4 border-blue-800 relative z-10">
        
        <div class="bg-blue-800 text-white p-4 flex items-center justify-between">
            <img src="logo_ucv.png" alt="Logo UCV" class="h-12 w-auto bg-white p-1 rounded-lg" onerror="this.src='https://placehold.co/100x40?text=UCV'">
            <div class="text-right">
                <h1 class="text-xl font-bold">El Laberinto del Saber</h1>
                <p class="text-blue-200 text-sm">Escuela de Educación Primaria</p>
            </div>
        </div>

        <div class="flex justify-between items-center px-8 py-4 bg-blue-50 border-b border-blue-100">
            <div class="text-blue-900 font-bold text-xl">Puntaje: <span id="score">0</span></div>
            <div id="hearts" class="flex gap-2 text-2xl">❤️ ❤️ ❤️</div>
        </div>

        <div id="stage" class="relative h-64 overflow-hidden border-b-4 border-blue-700 bg-blue-100">
            <div class="absolute inset-0 flex items-center justify-center text-gray-400 font-bold text-sm pointer-events-none">[Fondo: profesora.png]</div>
            <img id="dragon" src="dragon.png" alt="Dragón" class="absolute bottom-4 left-0 w-24 h-24 transition-all duration-300 ease-linear z-10 animate-fly" onerror="this.src='https://images.rawpixel.com/image_png_800/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDIzLTA4L3Jhd3BpeGVsX29mZmljZV8yNl9jYXJ0b29uX3JlZF9kcmFnb25fbmVvbl9saW5lX2FydF9pc29sYXRlZF9vbl9fOTU2NDlhYmMtOTQ3OS00N2EzLWJiYTEtNGVjZTAzMzA0ZTMzLnBuZw.png'">
        </div>

        <div class="px-6 py-4">
            <div class="w-full h-4 bg-gray-200 rounded-full overflow-hidden border border-gray-300">
                <div id="timer-bar" class="h-full bg-emerald-500 w-full transition-all duration-100 ease-linear shadow-inner"></div>
            </div>
        </div>

        <div class="p-6">
            <div id="q-image-container" class="mb-4 flex justify-center h-24"></div>
            <h3 id="question-text" class="text-xl font-bold text-gray-800 mb-6 text-center">Cargando desafío...</h3>
            <div id="btn-grid" class="grid gap-3"></div>
        </div>
    </div>

    <div id="end-overlay" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" style="display: none;">
        <div class="bg-white p-8 rounded-3xl max-w-md w-full text-center border-4 border-blue-600 shadow-2xl">
            <h2 id="end-title" class="text-3xl font-bold mb-2">¡Fin del Juego!</h2>
            <p id="end-message" class="text-gray-600 mb-6">Mensaje de resultado</p>
            <div class="bg-blue-50 rounded-2xl p-4 mb-6">
                <span class="text-gray-500 block uppercase tracking-wider text-xs font-bold">Puntaje Final</span>
                <span id="end-score" class="text-4xl font-bold text-blue-800">0</span>
            </div>
            <button onclick="startGame()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-6 rounded-2xl text-xl shadow-lg transition transform active:scale-95">
                Volver a Jugar 🔄
            </button>
        </div>
    </div>

    <script>
        const QUESTIONS = [
            { q: "¿Cómo crece el Girasol?", img: "girasol_1.png", options: ["Semilla", "Fruto", "Raíz"], correct: 0 },
            { q: "¿Cómo crece el Maíz?", img: "maiz_1.png", options: ["Semilla", "Roca", "Metal"], correct: 0 },
            { q: "¿Qué necesita la planta para vivir?", img: "imagen_3.png", options: ["Agua", "Solo luz", "Solo tierra"], correct: 0 }
        ];

        let score = 0, lives = 3, currentIdx = 0, dragonPos = 0, timer = 100, interval;

        function startGame() {
            score = 0; lives = 3; currentIdx = 0; dragonPos = 0; timer = 100;
            document.getElementById('end-overlay').style.display = 'none';
            updateUI();
            loadQuestion();
            runTimer();
        }

        function runTimer() {
            clearInterval(interval);
            interval = setInterval(() => {
                timer -= 0.14; 
                dragonPos += 0.07; 
                
                document.getElementById('timer-bar').style.width = timer + "%";
                document.getElementById('dragon').style.left = dragonPos + "%";
                
                if (dragonPos >= 85) gameOver(false);
                if (timer <= 0) { 
                    lives--; 
                    timer = 100; 
                    updateUI(); 
                    if(lives <= 0) gameOver(false); 
                }
            }, 100);
        }

        function loadQuestion() {
            const q = QUESTIONS[currentIdx];
            document.getElementById('question-text').textContent = q.q;
            const container = document.getElementById('q-image-container');
            container.innerHTML = q.img ? `<img src="${q.img}" class="h-24 w-auto rounded-xl shadow-lg border-2 border-blue-100" onerror="this.src='https://placehold.co/100x100?text=?'">` : '';
            const grid = document.getElementById('btn-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'w-full p-3 border-2 border-blue-200 rounded-xl font-semibold hover:bg-blue-600 hover:text-white transition';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(i);
                grid.appendChild(btn);
            });
        }

        function shrinkDragon() {
            // Animación visual de retroceso del dragón al acertar
            dragonPos = Math.max(0, dragonPos - 15);
            document.getElementById('dragon').style.left = dragonPos + "%";
        }

        function checkAnswer(idx) {
            if (idx === QUESTIONS[currentIdx].correct) {
                score += 25;
                shrinkDragon();
            } else {
                lives--;
            }
            updateUI();
            if (lives <= 0) { gameOver(false); return; }
            currentIdx++;
            if (currentIdx >= QUESTIONS.length) { gameOver(score >= 50); } // Victoria si consigues al menos 50 puntos
            else { loadQuestion(); }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('hearts').textContent = "❤️".repeat(lives);
        }

        function gameOver(won) {
            clearInterval(interval);
            const overlay = document.getElementById('end-overlay');
            const title = document.getElementById('end-title');
            const message = document.getElementById('end-message');
            const scoreDisplay = document.getElementById('end-score');
            
            scoreDisplay.textContent = score;
            
            if (won) {
                title.textContent = "¡Victoria! 🎉";
                title.className = "text-3xl font-bold text-emerald-600 mb-2";
                message.textContent = "¡Increíble! Lograste superar el laberinto y rescatar el conocimiento.";
            } else {
                title.textContent = "¡Oh no! 💥";
                title.className = "text-3xl font-bold text-red-600 mb-2";
                message.textContent = "El dragón te ha alcanzado o te quedaste sin vidas. ¡Inténtalo de nuevo!";
            }
            
            overlay.style.display = 'flex';
        }

        // Arranca el juego automáticamente
        startGame();
    </script>
</body>
</html>
